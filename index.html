<!DOCTYPE html>
<html lang="ua">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Таблиця множення</title>
     <script src="index.js"></script>
    <link rel="stylesheet" href="index.css" />
</head>
<body>

    <div class="card">
        <h2>Таблиця множення</h2>
        
        <div class="input-field">
            <label for="userNumber">Введіть число (1-10)</label>
            <input type="number" id="userNumber" placeholder="Наприклад: 7" min="1" max="10">
        </div>

        <button id="btnGenerate">Згенерувати</button>

        <div class="result-box">
            <div id="result" style="text-align: left; font-family: monospace; white-space: pre-line;">
                Тут з'явиться результат...
            </div>
        </div>
    </div>

   
</body>
</html>
